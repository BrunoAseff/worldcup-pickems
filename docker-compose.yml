services:
  postgres:
    image: postgres:17
    container_name: worldcup-pickems-postgres
    environment:
      POSTGRES_DB: worldcup_pickems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worldcup_pickems"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
